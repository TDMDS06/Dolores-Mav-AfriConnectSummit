<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="afriGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8090ff" />
      <stop offset="50%" stop-color="#63b5e5" />
      <stop offset="100%" stop-color="#55e2c4" />
    </linearGradient>
    
    <style>
     .logo-text-main { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 26px; fill: currentColor; }
      .logo-text-sub { font-family: 'Space Grotesk', sans-serif; font-weight: 500; font-size: 26px; fill: #63b5e5; }
      .logo-tagline { font-family: 'Inter', sans-serif; font-size: 10px; fill: #67748e; letter-spacing: 0.5px; }
      .network-node { fill: #55e2c4; }
      .network-line { stroke: url(#afriGrad); stroke-width: 1; stroke-opacity: 0.7; }
      .network-border { stroke: url(#afriGrad); stroke-width: 1.5; fill: none; }
      
      /* Si le site passe en mode sombre (attribut data-theme="dark" sur le html) */
      [data-theme="dark"] .logo-text-main { fill: #ffffff; }
      [data-theme="dark"] .logo-tagline { fill: #a0aec0; }
    </style>
  </defs>

  <g transform="translate(10, 10)">
    <path class="network-border" d="M 38,5 C 45,5 55,10 65,12 C 75,14 82,22 80,32 C 78,42 68,48 66,54 C 64,60 55,68 52,75 C 49,82 45,92 43,98 C 42,100 39,100 38,95 C 37,90 31,75 28,70 C 25,65 17,62 12,56 C 7,50 3,42 5,35 C 7,28 15,25 20,20 C 25,15 31,5 38,5 Z" />
    
